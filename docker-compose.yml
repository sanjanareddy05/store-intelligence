version: "3.9"

services:

  db:
    image: postgres:15
    container_name: store_postgres

    restart: always

    environment:
      POSTGRES_USER: store_user
      POSTGRES_PASSWORD: store_pass
      POSTGRES_DB: store_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: store_api

    depends_on:
      - db

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_data: